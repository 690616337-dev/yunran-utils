name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-x64:
    runs-on: macos-latest-large
    timeout-minutes: 60
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        npm install
        cd frontend && npm install && cd ..
        pip install -r backend/requirements.txt pyinstaller

    - name: Build frontend
      run: npm run build:frontend

    - name: Build Backend (PyInstaller x64)
      run: |
        cd backend
        pyinstaller --onefile --name backend --target-arch x86_64 main.py
        mkdir -p ../resources/backend
        cp dist/backend ../resources/backend/
        cd ..

    - name: Build Electron (x64)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-builder --mac dmg --x64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macOS-x64
        path: dist/*.dmg

  build-macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        npm install
        cd frontend && npm install && cd ..
        pip install -r backend/requirements.txt pyinstaller

    - name: Build frontend
      run: npm run build:frontend

    - name: Build Backend (PyInstaller ARM64)
      run: |
        cd backend
        pyinstaller --onefile --name backend --target-arch arm64 main.py
        mkdir -p ../resources/backend
        cp dist/backend ../resources/backend/
        cd ..

    - name: Build Electron (ARM64)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-builder --mac dmg --arm64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macOS-ARM64
        path: dist/*.dmg

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        npm install
        cd frontend && npm install && cd ..
        pip install -r backend/requirements.txt pyinstaller

    - name: Build frontend
      run: npm run build:frontend

    - name: Build Backend (PyInstaller)
      shell: bash
      run: |
        cd backend
        pyinstaller --onefile --name backend main.py
        mkdir -p ../resources/backend
        cp dist/backend.exe ../resources/backend/
        cd ..

    - name: Build Electron
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        if [ "${{ matrix.arch }}" == "x64" ]; then
          npx electron-builder --win nsis --x64
        else
          npx electron-builder --win nsis --arm64
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Windows-${{ matrix.arch }}
        path: dist/*.exe
